services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sena-portofolio:latest
    container_name: sena-portofolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    # Uncomment if you add runtime env vars in a local file:
    # env_file:
    #   - .env
    healthcheck:
      # Hits the app over the loopback to confirm the server is serving.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
